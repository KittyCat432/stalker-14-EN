- type: entity
  parent: NPCDoll
  id: NPCForesterCordonEN
  name: Forester [→   ←]
  description: An old man who's seen more than most Stalkers possibly could.
  suffix: ST, EN-TRADER, Cordon
  components:
  - type: Sprite
    sprite: _Stalker_EN/NPC/Forester.rsi
    state: forester
  - type: Physics
    bodyType: Static
  - type: DatasetVocalizer
    dataset: NPCStalkerForesterCordonAds
  - type: ActivatableUI
    key: enum.ShopUiKey.Key
    singleUser: true
  - type: UserInterface
    interfaces:
      enum.ShopUiKey.Key:
        type: ShopBoundUserInterface
  - type: Shop
    moneyId: Roubles
    shopPresetId: NpcForesterCordonEN
  - type: TypingIndicator
    proto: robot
  - type: TTS # Corvax-TTS
    voice: TrainingRobot
  - type: Speech
    speechVerb: Robotic
    speechSounds: Alto
  - type: IntrinsicRadioReceiver
  - type: IntrinsicRadioTransmitter
    channels:
    - Binary
  - type: ActiveRadio
    channels:
    - Binary
    - Common

- type: entity
  parent: NPCForesterCordonEN
  id: NPCForesterRedForestEN
  suffix: ST, EN-TRADER, RF
  components:
  - type: DatasetVocalizer
    dataset: NPCStalkerForesterRedForestAds
  - type: Shop
    moneyId: Dollar
    shopPresetId: NpcForesterRedForestEN

- type: entity
  parent: NPCForesterCordonEN
  id: NPCForesterLimanskEN
  suffix: ST, EN-TRADER, Limansk
  components:
  - type: DatasetVocalizer
    dataset: NPCStalkerForesterLimanskAds
  - type: Shop
    moneyId: Dollar
    shopPresetId: NpcForesterLimanskEN



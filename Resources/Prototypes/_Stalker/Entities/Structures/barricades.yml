- type: entity
  id: STBarricade
  parent: Barricade
  suffix: ST, Mapping
  components:
  - type: Sprite
    sprite: _Stalker/Structures/barricades.rsi
    state: barricade_full
  - type: Cover # EN start
    hitChance: 0.75
    closeMissDistance: 1 # EN end

- type: entity
  id: STBarricadeBlock
  parent: BarricadeBlock
  suffix: ST, Mapping
  components:
  - type: Sprite
    sprite: _Stalker/Structures/barricades.rsi
    state: barricade
  - type: Cover # EN start
    hitChance: 0.50
    closeMissDistance: 1 # EN end

#Directional Barricade
- type: entity
  id: STBarricadeDirectional
  parent: BarricadeDirectional
  suffix: ST, Mapping
  components:
  - type: Sprite
    sprite: _Stalker/Structures/barricades.rsi
    state: barricade_directional
    noRot: false
  - type: Cover # EN start
    hitChance: 0.60
    closeMissDistance: 1 # EN end
